<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Matrix Digital Rain</title>
    <style>
        body { margin: 0; overflow: hidden; background: black; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        // Adatta il canvas alla finestra
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        // Caratteri (Katakana + Numeri)
        const chars = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789";
        const fontSize = 16;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = new Array(columns).fill(1);

        function draw() {
            // Effetto scia: rettangolo nero semi-trasparente sopra il frame precedente
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                
                // La "testa" della pioggia è bianca per l'effetto bagliore
                ctx.fillStyle = "#fff"; 
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                // Il resto della scia è verde Matrix
                ctx.fillStyle = "#0F0";
                ctx.fillText(text, i * fontSize, (drops[i] - 1) * fontSize);

                // Reset della colonna quando tocca il fondo (con un tocco di casualità)
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
